<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera — Homelab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0a0c0f;
      --card:   #0f1318;
      --border: rgba(255,255,255,0.07);
      --text:   #e6edf3;
      --muted:  #7d8590;
      --green:  #3fb950;
      --red:    #f85149;
      --yellow: #e3b341;
      --mono:   'JetBrains Mono', monospace;
      --sans:   'Inter', sans-serif;
      --radius: 10px;
      --cam-color: #a78bfa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2.5rem 2rem 4rem;
      max-width: 1140px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand { display: flex; flex-direction: column; gap: 4px; }
    .brand-title {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .brand-title span { color: var(--cam-color); }
    .brand-sub {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }
    .back-btn {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.13); }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .status-chip {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-chip i { font-size: 12px; }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 1.5s infinite;
      flex-shrink: 0;
    }
    .live-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
    .live-dot.stale   { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Stream container ── */
    .stream-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      margin-bottom: 1.5rem;
    }
    .stream-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--cam-color);
      z-index: 2;
    }
    .stream-img {
      width: 100%;
      display: block;
      /* Maintain 16:9 aspect ratio */
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #000;
    }
    .stream-overlay {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border-radius: 5px;
      padding: 5px 10px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: #fff;
    }

    /* ── Offline overlay ── */
    .offline-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      z-index: 3;
    }
    .offline-overlay.show { display: flex; }
    .offline-overlay i { font-size: 40px; color: var(--muted); }
    .offline-overlay p { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }

    /* ── Info cards ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .info-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .info-val {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .info-val.ok     { color: var(--green); }
    .info-val.warn   { color: var(--red); }
    .info-val.caution{ color: var(--yellow); }

    /* ── Snapshot section ── */
    .section-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
      margin-top: 1.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .snapshot-btn {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .snapshot-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.13); }

    footer {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-title" id="brandTitle"><span>CAM</span> — HOMELAB</div>
    <div class="brand-sub" id="brandSub">ov5647 · 1280×720 · 15fps</div>
  </div>
  <a class="back-btn" id="backBtn" href="#">
    <i class="ti ti-arrow-left"></i> Dashboard
  </a>
</header>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-chip">
    <div class="live-dot" id="liveDot"></div>
    <span id="liveLabel">Checking...</span>
  </div>
  <div class="status-chip"><i class="ti ti-clock"></i> Frame age: <span id="frameAge">—</span></div>
  <div class="status-chip"><i class="ti ti-refresh" id="refreshIcon"></i> <span id="lastCheck">—</span></div>
</div>

<!-- Live stream -->
<div class="stream-wrap">
  <img class="stream-img" id="streamImg" src="" alt="Camera feed" />
  <div class="stream-overlay">
    <div class="live-dot" id="streamDot"></div>
    LIVE
  </div>
  <div class="offline-overlay" id="offlineOverlay">
    <i class="ti ti-camera-off"></i>
    <p>Camera unavailable — is camera-stream.service running?</p>
  </div>
</div>

<!-- Info cards -->
<div class="info-grid">
  <div class="info-card">
    <div class="info-label">Status</div>
    <div class="info-val ok" id="infoStatus">—</div>
  </div>
  <div class="info-card">
    <div class="info-label">Resolution</div>
    <div class="info-val">1280 × 720</div>
  </div>
  <div class="info-card">
    <div class="info-label">Framerate</div>
    <div class="info-val">15 fps</div>
  </div>
  <div class="info-card">
    <div class="info-label">Sensor</div>
    <div class="info-val">OV5647</div>
  </div>
</div>

<!-- Snapshot -->
<div class="section-label">Snapshot</div>
<a class="snapshot-btn" id="snapshotBtn" href="#" target="_blank">
  <i class="ti ti-camera"></i> Open latest snapshot
</a>

<footer>
  <span id="footerLeft">camera.rpi · homelab</span>
  <span>Updated <strong id="footerUpdated">—</strong></span>
</footer>

<script>
  const HOST     = window.location.hostname;
  // camera.rpi.riaanjlagrange.com → api.rpi.riaanjlagrange.com
  // strip "camera." prefix to get the base host
  const BASE_HOST = HOST.replace(/^camera\./, '');
  const API_BASE  = `https://api.${BASE_HOST}`;
  const DASH_URL  = `https://${BASE_HOST}`;

  // Wire up static links
  document.getElementById('backBtn').href    = DASH_URL;
  document.getElementById('brandSub').textContent = `ov5647 · 1280×720 · 15fps · ${BASE_HOST}`;
  document.getElementById('footerLeft').textContent = `${HOST} · homelab`;
  document.getElementById('snapshotBtn').href = `${API_BASE}/api/camera/snapshot`;

  // ── Stream ──────────────────────────────────────────────────────────────────
  // We use the MJPEG stream endpoint directly as the img src.
  // Browsers handle multipart/x-mixed-replace natively — it just plays.
  const streamImg = document.getElementById('streamImg');
  streamImg.src = `${API_BASE}/api/camera/stream`;

  streamImg.onerror = () => {
    document.getElementById('offlineOverlay').classList.add('show');
    setOffline();
  };

  streamImg.onload = () => {
    document.getElementById('offlineOverlay').classList.remove('show');
  };

  // ── Status polling ──────────────────────────────────────────────────────────
  // Poll /api/camera/status every 5 seconds to update the status chips.
  // This is separate from the stream itself — stream runs independently.

  function setOffline() {
    const dot = document.getElementById('liveDot');
    const sdot = document.getElementById('streamDot');
    dot.className = 'live-dot offline';
    sdot.className = 'live-dot offline';
    document.getElementById('liveLabel').textContent = 'Offline';
    document.getElementById('infoStatus').textContent = 'Offline';
    document.getElementById('infoStatus').className = 'info-val warn';
  }

  async function checkStatus() {
    try {
      const r    = await fetch(`${API_BASE}/api/camera/status`);
      const data = await r.json();

      const dot  = document.getElementById('liveDot');
      const sdot = document.getElementById('streamDot');

      if (!data.available) {
        setOffline();
        document.getElementById('offlineOverlay').classList.add('show');
        return;
      }

      document.getElementById('offlineOverlay').classList.remove('show');
      document.getElementById('frameAge').textContent = `${data.frame_age_s}s`;
      document.getElementById('lastCheck').textContent =
        new Date().toLocaleTimeString('en-ZA');

      if (data.stale) {
        dot.className = 'live-dot stale';
        sdot.className = 'live-dot stale';
        document.getElementById('liveLabel').textContent = 'Stale — stream may have stopped';
        document.getElementById('infoStatus').textContent = 'Stale';
        document.getElementById('infoStatus').className = 'info-val caution';
      } else {
        dot.className = 'live-dot';
        sdot.className = 'live-dot';
        document.getElementById('liveLabel').textContent = 'Live';
        document.getElementById('infoStatus').textContent = 'Online';
        document.getElementById('infoStatus').className = 'info-val ok';
      }

      document.getElementById('footerUpdated').textContent =
        new Date().toLocaleTimeString('en-ZA');

    } catch(e) {
      setOffline();
    }
  }

  checkStatus();
  setInterval(checkStatus, 5000);
</script>
</body>
</html>
